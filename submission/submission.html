<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      position: relative;
      width: 960px;
      height: 540px;
    }

    #skip {
      display: none; /* Hidden until ad starts */
      position: absolute;
      bottom: 10%;
      right: 0%;
      width: 15%;
      height: 10%;
      border-radius: 7px 0 0 7px;
      border: 1px solid rgba(0, 0, 0, 0.85);
      border-right-width: 0;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.4rem;
      line-height: 46px;
      text-align: center;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    #skipText {
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    #skipButton {
      background: magenta; /*for debugging so WE can see the button*/
      background: none;
      cursor: inherit;
      position: absolute; /*needs to be different if we want to move it around*/
      border: none;
      height: 80%;
      width: 30%;
      left: 50%;
      top: 10%;
      user-select: none;
      -webkit-user-select: none;
      -ms-user-select: none;
    }

    #xButton {
      display: none; /* Hidden until ad starts */
      position: absolute;
      top: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      background: rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      color: white;
      font-size: 16px;
      cursor: pointer;
      
      align-items: center;
      justify-content: center;
      line-height: 1;
      font-family: sans-serif;
    }

    #xButton:hover {
      background: rgba(0, 0, 0, 0.8);
    }


    #oldskip {
      display: none; /* Hidden until ad starts */
      color: white;
      position: absolute;
      bottom: 10%;
      right: 5%;
      width: 4%;
      height: 5%;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
      /* background-color: magenta; /*for debugging so WE can see the button */
    }

    /* The true clickable region is smaller than the drawn button. */
    #oldskip::before {
      content: 'Skip';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 300%; /* Slightly bigger here */
      height: 200%;
      left: 73%;
      border-radius: 7px 0 0 7px;
      border: 1px solid rgba(0, 0, 0, 0.85);
      border-right-width: 0;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.05rem;
      line-height: 46px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    #oldskip.escalated::before {
      content: 'Why skip us?';
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    <div id="skip"> 
      <div id="skipText">Skip</div>
      <button id="skipButton"></button>
    </div>
    <!-- <button id="debugpause">pause</button> -->
    <button id="xButton">&times;</button>
  </div>
  <script type="text/javascript" src="./guilt.js"></script>
</body>
</html>
