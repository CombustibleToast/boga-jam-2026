<!doctype html>
<html lang="en">

<head>
	<meta charset="utf-8">
	<title>Joel</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">

	<style type="text/css">
		html,
		body {
			background: transparent;
			margin: 0;
			padding: 0;
			font-family: sans-serif;
		}

		#overlay-container {
			width: 960px;
			height: 540px;
		}

		/* Your style here... (feel free to remove this example styling) */
		#skip {
			display: none;
			/* Hidden until ad starts */
			position: absolute;
			bottom: 60px;
			right: 0;
			padding: 10px 18px;
			background: rgba(0, 0, 0, 0.6);
			border: 1px solid black;
			border-right-width: 0;
			font-size: 1.2rem;
			border-radius: 4px 0 0 4px;
			color: white;
			cursor: pointer;
		}

		#debugPause {
			/* Hidden until ad starts */
			position: absolute;
			bottom: 100px;
			right: 0;
			padding: 10px 18px;
			background: rgba(0, 0, 0, 0.6);
			border: 1px solid black;
			border-right-width: 0;
			font-size: 1.2rem;
			border-radius: 4px 0 0 4px;
			color: white;
			cursor: pointer;
		}

		#debugAddBall{
			/* Hidden until ad starts */
			position: absolute;
			bottom: 0;
			left: 0;
			padding: 10px 18px;
			background: rgba(0, 0, 0, 0.6);
			border: 1px solid black;
			border-right-width: 0;
			font-size: 1.2rem;
			border-radius: 4px 0 0 4px;
			color: white;
			cursor: pointer;
		}

		.ball {
			position: fixed;
			background-color: powderblue;
			border-radius: 100%;
			width: 100px;
			height: 100px;
			font: Arial;
			text-align: center;
			font-size: 30px;
		}
	</style>
</head>

<body>
	<div id="overlay-container">
		<!-- We've added a sample button. Feel free to remove it: -->
		<button id="skip">
			Skip Ad...
		</button>
		<button id="debugPause">
			pause me?
		</button>
		<button id="debugAddBall">
			BALL!!
		</button>
		<div id="ballContainer">
			<div class="ball">
				asdf
			</div>
		</div>
	</div>


	<script type="text/javascript" src="./balls.js"></script>
</body>

</html>
