<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Joel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style type="text/css">
    html,
    body {
      background: transparent;
      margin: 0;
      padding: 0;
      font-family: sans-serif;
    }

    #overlay-container {
      position: relative;
      width: 960px;
      height: 540px;
    }

    #skip {
      display: none; /* Hidden until ad starts */
      position: absolute;
      bottom: 60px;
      right: 18px;
      width: 116px;
      height: 30px;
      padding: 0;
      border: 0;
      background: transparent;
      cursor: pointer;
    }

    /* The true clickable region is smaller than the drawn button. */
    #skip::before {
      content: 'Skip them,';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 184px;
      height: 46px;
      border-radius: 7px 0 0 7px;
      border: 1px solid rgba(0, 0, 0, 0.85);
      border-right-width: 0;
      background: rgba(0, 0, 0, 0.72);
      color: #fff;
      font-family: sans-serif;
      font-size: 1.05rem;
      line-height: 46px;
      text-align: center;
      pointer-events: none;
      white-space: nowrap;
    }

    #skip.escalated::before {
      content: 'Why skip us?';
    }
  </style>
</head>

<body>
  <div id="overlay-container">
    <button id="skip" aria-label="Skip them,"></button>
  </div>

  <script type="text/javascript" src="./guilt.js"></script>
</body>
</html>
